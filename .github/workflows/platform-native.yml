name: Platform Native

on:
  workflow_dispatch:

concurrency:
  group: platform-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: taiki-e/install-action@v2
        with:
          tool: protoc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install chromium
      - name: Run macOS platform-native checks
        run: bun run check:platform
      - name: Run desktop bridge truth gate
        run: bun run test:e2e:desktop-bridge:truth

  platform-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux desktop and native-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            pkg-config \
            libdbus-1-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            dbus-x11 \
            gnome-keyring \
            systemd \
            wget
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: taiki-e/install-action@v2
        with:
          tool: protoc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Linux platform-native checks
        run: bun run check:platform

  platform-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: taiki-e/install-action@v2
        with:
          tool: protoc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Windows platform-native checks
        run: bun run check:platform
