name: Mutation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

jobs:
  javascript-mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Stryker
        run: bun run mutation:js

  rust-mutation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Run parser cargo-mutants contract
        run: cargo mutants -p browser-history-parser --timeout 300
      - name: Run AI helper cargo-mutants contract
        run: cargo mutants -p vault-core --file crates/vault-core/src/ai.rs -F 'ai_index_status|ai_queue_status|reconcile_ai_queue_controls|provider_capabilities|provider_connection_failure_report|test_provider_connection' --timeout 300
