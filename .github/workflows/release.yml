name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: Create or update a draft release
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.sha }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-latest
            rust_targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - label: macOS Intel
            os: macos-latest
            rust_targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - label: Windows
            os: windows-latest
            rust_targets: ''
            args: ''
          - label: Linux
            os: ubuntu-22.04
            rust_targets: ''
            args: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Install Rust toolchain with target
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: PathKeep ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseBody: |
            Automated desktop release for PathKeep.

            Download the installer or package for your platform from the assets below.
            A checksum manifest is attached after all matrix builds complete.
          releaseCommitish: ${{ github.sha }}
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          releaseAssetNamePattern: '[name]_[version]_[platform]_[arch][setup][ext]'
          args: ${{ matrix.args }}

  release-manifest:
    name: Publish checksum manifest
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          resolved_tag="${{ github.ref_type == 'tag' && github.ref_name || '' }}"
          if [ -z "$resolved_tag" ]; then
            resolved_tag="v$(python -c "import json, pathlib; print(json.loads(pathlib.Path('package.json').read_text())['version'])")"
          fi
          mkdir -p dist/release
          gh release download "$resolved_tag" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist/release
          printf '%s' "$resolved_tag" > dist/release/.resolved-tag

      - name: Generate SHA256SUMS.txt
        run: |
          cd dist/release
          find . -type f ! -name 'SHA256SUMS.txt' ! -name '.resolved-tag' -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 > SHA256SUMS.txt

      - name: Upload checksum manifest to the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          resolved_tag="$(cat dist/release/.resolved-tag)"
          gh release upload "$resolved_tag" \
            dist/release/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Upload checksum workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: dist/release/SHA256SUMS.txt
