[package]
name = "chrome-history-vault-desktop"
version = "0.1.0"
edition = "2024"
description = "Audit-first desktop archive for Chrome history"

[lib]
name = "chrome_history_vault_desktop"
path = "src/lib.rs"

[workspace]
members = ["crates/vault-core", "crates/vault-platform", "crates/vault-worker"]
resolver = "2"

[workspace.dependencies]
anyhow = "1.0.100"
chrono = { version = "0.4.42", features = ["serde"] }
directories = "6.0.0"
hex = "0.4.3"
keyring = "4.0.0-rc.3"
keyring-core = "0.7.2"
plist = "1.8.0"
rusqlite = { version = "0.39.0", features = ["backup", "bundled-sqlcipher-vendored-openssl", "serde_json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
sha2 = "0.10.9"
tempfile = "3.23.0"
thiserror = "2.0.17"
walkdir = "2.5.0"
zip = { version = "2.4.2", default-features = false, features = ["deflate"] }

[dependencies]
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tauri = { version = "2.8.5", features = [] }
tauri-plugin-autostart = "2.5.1"
tauri-plugin-stronghold = "2.3.1"
vault-core = { path = "crates/vault-core" }
vault-platform = { path = "crates/vault-platform" }
vault-worker = { path = "crates/vault-worker" }

[build-dependencies]
tauri-build = { version = "2.5.1", features = [] }
