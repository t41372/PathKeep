[advisories]
version = 2
db-urls = ["https://github.com/RustSec/advisory-db"]
ignore = [
  { id = "RUSTSEC-2024-0411", reason = "Tauri's Linux WebKit/GTK3 stack still pulls gdkwayland-sys until upstream migrates to GTK4." },
  { id = "RUSTSEC-2024-0412", reason = "Tauri's Linux WebKit/GTK3 stack still pulls gdk until upstream migrates to GTK4." },
  { id = "RUSTSEC-2024-0413", reason = "Tauri's Linux WebKit/GTK3 stack still pulls atk until upstream migrates to GTK4." },
  { id = "RUSTSEC-2024-0414", reason = "Tauri's Linux WebKit/GTK3 stack still pulls gdkx11-sys until upstream migrates to GTK4." },
  { id = "RUSTSEC-2024-0415", reason = "Tauri's Linux WebKit/GTK3 stack still pulls gtk until upstream migrates to GTK4." },
  { id = "RUSTSEC-2024-0416", reason = "Tauri's Linux WebKit/GTK3 stack still pulls atk-sys until upstream migrates to GTK4." },
  { id = "RUSTSEC-2024-0417", reason = "Tauri's Linux WebKit/GTK3 stack still pulls gdkx11 until upstream migrates to GTK4." },
  { id = "RUSTSEC-2024-0418", reason = "Tauri's Linux WebKit/GTK3 stack still pulls gdk-sys until upstream migrates to GTK4." },
  { id = "RUSTSEC-2024-0419", reason = "Tauri's Linux WebKit/GTK3 stack still pulls gtk3-macros until upstream migrates to GTK4." },
  { id = "RUSTSEC-2024-0420", reason = "Tauri's Linux WebKit/GTK3 stack still pulls gtk-sys until upstream migrates to GTK4." },
  { id = "RUSTSEC-2024-0429", reason = "glib is only pulled transitively through Tauri's Linux GTK3 stack; the affected VariantStrIter APIs are not part of our app code path." },
  { id = "RUSTSEC-2024-0436", reason = "paste is only pulled transitively by upstream stronghold and Turso-backed keyring crates; no maintained drop-in is available without replacing those integrations." },
  { id = "RUSTSEC-2024-0370", reason = "proc-macro-error is only pulled transitively by GTK3 proc-macro dependencies in the current Tauri Linux stack." },
  { id = "RUSTSEC-2025-0057", reason = "fxhash is only pulled transitively by Tauri/urlpattern internals; upstream has not migrated that path yet." },
  { id = "RUSTSEC-2025-0075", reason = "unic-char-range is only pulled transitively by tauri-utils/urlpattern; upstream has not migrated off rust-unic yet." },
  { id = "RUSTSEC-2025-0080", reason = "unic-common is only pulled transitively by tauri-utils/urlpattern; upstream has not migrated off rust-unic yet." },
  { id = "RUSTSEC-2025-0081", reason = "unic-char-property is only pulled transitively by tauri-utils/urlpattern; upstream has not migrated off rust-unic yet." },
  { id = "RUSTSEC-2025-0098", reason = "unic-ucd-version is only pulled transitively by tauri-utils/urlpattern; upstream has not migrated off rust-unic yet." },
  { id = "RUSTSEC-2025-0100", reason = "unic-ucd-ident is only pulled transitively by tauri-utils/urlpattern; upstream has not migrated off rust-unic yet." },
  { id = "RUSTSEC-2025-0141", reason = "bincode 1.x is only pulled transitively by tauri-plugin-stronghold/iota_stronghold; replacing it requires an upstream stronghold migration." },
]
unmaintained = "workspace"
unsound = "workspace"
unused-ignored-advisory = "deny"
yanked = "deny"

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "GPL-3.0-only",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
# Tauri desktop apps carry large, multi-platform dependency graphs where duplicate
# transitive versions are often upstream-locked and not actionable for workspace code.
# We still keep bans enabled for wildcards and explicit future deny rules.
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
